<style>
:root{

body{

button,input{font:inherit}

.app{width:min(900px,100%);height:100dvh;margin:auto;display:flex;flex-direction:column}

.icon{display:block;font-size:24px;margin-bottom:6px}

.chat{flex:1;overflow:auto;padding:8px 14px 138px;scroll-behavior:smooth}
.row{display:flex;margin:9px 0}
.row.user{justify-content:flex-end}
.wrap{max-width:87%}
.bubble{
  padding:12px 14px;border-radius:20px;white-space:pre-wrap;line-height:1.5;font-size:15px;word-break:break-word
}
.row.ai .bubble{background:var(--panel2);border:1px solid var(--line);border-bottom-left-radius:7px}
.row.user .bubble{background:linear-gradient(135deg,#7c3aed,#2563eb 62%,#0891b2);border-bottom-right-radius:7px}
.meta{margin-top:4px;padding:0 5px;color:var(--muted);font-size:10px}
.row.user .meta{text-align:right}
.typing{display:inline-flex;gap:5px;align-items:center}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--mint);animation:b 1.1s infinite}
.typing span:nth-child(2){animation-delay:.14s}.typing span:nth-child(3){animation-delay:.28s}
@keyframes b{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
.composerWrap{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:min(900px,100%);
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(7,10,24,0),rgba(7,10,24,.96) 26%,rgba(7,10,24,1))
}
.composer{
  display:flex;gap:8px;padding:7px;border:1px solid var(--line);border-radius:22px;background:rgba(17,24,51,.95)
}
.composer input{
  flex:1;min-width:0;border:0;outline:0;background:transparent;color:white;padding:12px 11px;font-size:16px
}
.send{

  color:#06101f;font-size:20px;font-weight:900
}
.send:disabled{opacity:.45}
.overlay{
  position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;padding:16px;
  background:rgba(2,6,23,.76);backdrop-filter:blur(12px)

.sheet{width:min(560px,100%);padding:18px;border:1px solid var(--line);border-radius:26px;background:#0b1026}

  width:100%;margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:16px;background:#151d3d;color:#fff;font-weight:800

.sheet .danger{background:#351521;color:#fecdd3}
@media(max-width:680px){.quick{grid-template-columns:repeat(3,1fr)}}
@media(max-width:430px){.quick{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "nova_ai_v6_messages";

  const SYSTEM_PROMPT = `
Sen Nova AI's脛卤n.
Kullan脛卤c脛卤n脛卤n ad脛卤 脙聳mer.
T脙录rk脙搂e konu脜聼.
S脛卤cak, samimi, do脛聼al, e脛聼lenceli ve anla脜聼脛卤l脛卤r ol.

Ayn脛卤 cevab脛卤 tekrar tekrar verme.
脙聳nceki konu脜聼malar脛卤 dikkate al.
Kullan脛卤c脛卤n脛卤n iste脛聼ine g脙露re k脛卤sa veya ayr脛卤nt脛卤l脛卤 cevap ver.

脙聳mer futbolu seviyor.
Futbol antrenman脛卤, g脙录nl脙录k plan, okul, genel sorular ve yemek plan脛卤 konusunda yard脛卤mc脛卤 ol.

Futbol antrenman脛卤nda:
- G脙录venli脛聼i 脙露nemse.
- Keskin a脛聼r脛卤 veya sakatl脛卤k belirtisinde durmas脛卤n脛卤 ve g脙录vendi脛聼i bir yeti脜聼kine haber vermesini s脙露yle.
- A脜聼脛卤r脛卤 antrenman脛卤 te脜聼vik etme.

Yemek plan脛卤nda:
- Dengeli ve ya脜聼a uygun 脙露neriler yap.
- A脜聼脛卤r脛卤 k脛卤s脛卤tlay脛卤c脛卤 diyet, kalori tak脛卤nt脛卤s脛卤 veya 脙露脛聼脙录n atlamay脛卤 te脜聼vik etme.
- Alerji veya 脙露zel ihtiya脙搂 varsa 脙露nce sor.
- Sa脛聼l脛卤kl脛卤 b脙录y脙录me ve enerji i脙搂in 脙搂e脜聼itlili脛聼e 脙露nem ver.

Ders sorular脛卤nda:

- Gerekti脛聼inde ad脛卤m ad脛卤m a脙搂脛卤kla.

Yan脛卤tlar脛卤 do脛聼al tut.
Kullan脛卤c脛卤 istemedi脛聼i s脙录rece a脜聼脛卤r脛卤 uzun cevap verme.
`;

  const chat = document.getElementById("chat");
  const input = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const settingsSheet = document.getElementById("settingsSheet");

  let messages = loadMessages();
  let isThinking = false;

  function loadMessages() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch {
      return [];
    }
  }

  function saveMessages() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
  }

  function time(ts) {
    return new Date(ts).toLocaleTimeString("tr-TR", {hour:"2-digit", minute:"2-digit"});
  }

  function render() {
    chat.innerHTML = "";

    for (const m of messages) {
      const row = document.createElement("div");
      row.className = "row " + m.role;

      const wrap = document.createElement("div");
      wrap.className = "wrap";

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = m.text;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = time(m.time);

      wrap.appendChild(bubble);
      wrap.appendChild(meta);
      row.appendChild(wrap);
      chat.appendChild(row);
    }

    if (isThinking) {
      const row = document.createElement("div");
      row.className = "row ai";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = "<span></span><span></span><span></span>";

      bubble.appendChild(typing);
      row.appendChild(bubble);
      chat.appendChild(row);
    }

    requestAnimationFrame(() => {
      chat.scrollTop = chat.scrollHeight;
    });
  }

  function addMessage(role, text) {
    messages.push({role, text, time: Date.now()});

    if (messages.length > 120) {
      messages = messages.slice(-120);
    }

    saveMessages();
    render();
  }

  function buildConversation() {
    const recent = messages
      .filter(m => m.role === "user" || m.role === "ai")
      .slice(-30)
      .map(m => ({
        role: m.role === "ai" ? "assistant" : "user",
        content: m.text
      }));

    return [
      {role:"system", content:SYSTEM_PROMPT},
      ...recent
    ];
  }

  function extractText(response) {
    if (!response) return "";
    if (typeof response === "string") return response;
    if (response.message && typeof response.message.content === "string") return response.message.content;
    if (typeof response.text === "string") return response.text;
    return String(response);
  }

  async function getLiveReply() {
    if (typeof puter === "undefined" || !puter.ai || typeof puter.ai.chat !== "function") {
      throw new Error("Puter AI y脙录klenemedi.");
    }

    const response = await puter.ai.chat(buildConversation());
    const reply = extractText(response).trim();

    if (!reply) throw new Error("Bo脜聼 cevap geldi.");

    return reply;
  }

  async function sendMessage(textOverride) {
    if (isThinking) return;

    const text = String(textOverride ?? input.value).trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";

    isThinking = true;
    sendBtn.disabled = true;
    input.disabled = true;
    render();

    try {
      const reply = await getLiveReply();
      isThinking = false;
      addMessage("ai", reply);
    } catch (error) {
      console.error(error);
      isThinking = false;

      const raw = String(error?.message || error?.msg || error || "").toLowerCase();

      let friendly = "Canl脛卤 yapay zek脙垄ya ba脛聼lan脛卤rken sorun oldu aga 冒聼聵聟 脛掳nternetini kontrol edip tekrar dene.";

      if (raw.includes("auth") || raw.includes("sign") || raw.includes("login")) {
        friendly = "Canl脛卤 AI i脙搂in Puter giri脜聼 ekran脛卤 a脙搂脛卤lmas脛卤 gerekebilir. A脙搂脛卤lan pencereyi tamamlay脛卤p tekrar dene.";
      }

      addMessage("ai", friendly);
    } finally {
      sendBtn.disabled = false;
      input.disabled = false;
      input.focus();
      render();
    }
  }

  sendBtn.addEventListener("click", () => sendMessage());

  input.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });

  document.querySelectorAll("[data-prompt]").forEach(button => {
    button.addEventListener("click", () => sendMessage(button.dataset.prompt));
  });

  document.getElementById("settingsBtn").addEventListener("click", () => {
    settingsSheet.classList.remove("hidden");
  });

  document.getElementById("closeSettingsBtn").addEventListener("click", () => {
    settingsSheet.classList.add("hidden");
  });

  document.getElementById("clearHistoryBtn").addEventListener("click", () => {
    messages = [{
      role:"ai",
      text:"Ge脙搂mi脜聼 temizlendi aga 冒聼聵聨 Yeni sayfa, yeni ba脜聼lang脛卤脙搂. Ne yap脛卤yoruz?",
      time:Date.now()
    }];

    saveMessages();
    render();
    settingsSheet.classList.add("hidden");
  });

  if (messages.length === 0) {
    messages = [{
      role:"ai",
      text:"Selam 脙聳mer 冒聼聭聥 Ben Nova AI. Art脛卤k haz脛卤r cevap vermiyorum; canl脛卤 yapay zek脙垄 ile konu脜聼uyorum. Bana istedi脛聼ini yaz aga 冒聼聵聨芒聹篓",
      time:Date.now()

})();
</script>

</html>
